<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Webinar - OfficeAgent</title>
  <link rel="stylesheet" href="/css/reset.css">
  <link rel="stylesheet" href="/css/common.css">
  <link rel="stylesheet" href="/css/pages/webinar.css">
</head>
<body>
  <div id="header"></div>
  <main>
    <section class="webinar-hero section">
      <div class="container" style="text-align:center;">
        <h1 class="section-title">Webinar</h1>
        <p class="section-subtitle">오피스에이전트의 최신 소식과 활용법을 만나보세요</p>
      </div>
    </section>
    <section class="webinar-content section">
      <div class="container">
        <div class="webinar-card">
          <img src="http://edm.officekeeper.co.kr/2026/oa/202604_oa/1000/1000.png" alt="웨비나 이벤트">
          <a href="https://event-us.kr/m/123493/52636" class="btn-primary" target="_blank" rel="noopener noreferrer" style="margin-top:24px;">신청하기</a>
        </div>
      </div>
    </section>
  </main>
  <div id="footer"></div>
  <script src="/js/common.js"></script>
  <script type="module" src="__CHATBOT_DOMAIN__/widget-loader.js"></script>
  <script type="module">
    (function () {
      function whenReady(fn) {
        if (typeof window.ChatWidget?.init === 'function') { fn(); return; }
        requestAnimationFrame(() => whenReady(fn));
      }
      whenReady(() => {
        window.ChatWidget.init({
          site_key: '__SITE_KEY__',
        });
      });
    })();
  </script>
</body>
</html>
